<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quizzy Online — OPE Osakidetza</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <link rel="stylesheet" href="./styles.css" />
        <script>
            (function () {
                try {
                    var t = localStorage.getItem('celador_theme');
                    if (t !== 'light' && t !== 'dark') {
                        t =
                            window.matchMedia &&
                            window.matchMedia('(prefers-color-scheme: dark)')
                                .matches
                                ? 'dark'
                                : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', t);
                } catch (e) {
                    /* ignore */
                }
            })();
        </script>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div>
                    <h1>Quizzy — OPE Osakidetza</h1>
                    <p class="subtitle" id="subtitle">Test de práctica</p>
                </div>
                <div class="stats" id="stats" hidden>
                    <div class="stat">
                        Pregunta<b
                            ><span id="current">1</span>/<span id="total"
                                >0</span
                            ></b
                        >
                    </div>
                    <div class="stat">Aciertos<b id="correct">0</b></div>
                    <div class="stat">Fallos<b id="wrong">0</b></div>
                    <div class="stat">% acierto<b id="pct">—</b></div>
                </div>
            </header>

            <div class="controls setup-controls">
                <span class="spacer"></span>
                <button
                    id="theme-toggle"
                    type="button"
                    aria-label="Cambiar tema"
                    title="Cambiar tema"
                >
                    🌙
                </button>
            </div>

            <div id="setup-area">
                <div class="card">
                    <h2 class="setup-title">
                        Elige los conjuntos de preguntas
                    </h2>
                    <p class="setup-help">
                        Puedes seleccionar uno o varios. Al marcar varios, las
                        preguntas se combinan en un solo test.
                    </p>
                    <div id="set-list" class="set-list"></div>
                    <div class="nav">
                        <span id="setup-total" class="setup-total"
                            >0 preguntas seleccionadas</span
                        >
                        <button id="start-btn" class="primary" disabled>
                            Empezar →
                        </button>
                    </div>
                </div>
            </div>

            <div id="quiz-container" hidden>
                <div class="controls">
                    <div class="mode-toggle">
                        <button id="mode-seq" class="active">Orden</button>
                        <button id="mode-rand">Aleatorio</button>
                    </div>
                    <button id="change-sets">← Cambiar conjuntos</button>
                    <button id="restart">↻ Reiniciar</button>
                    <button id="review" disabled>Ver fallos</button>
                </div>

                <div class="progress">
                    <div
                        class="progress-bar"
                        id="bar"
                        style="width: 0.5%"
                    ></div>
                </div>

                <div id="quiz-area"></div>

                <details class="jumper">
                    <summary>Ir a pregunta…</summary>
                    <div class="grid" id="grid"></div>
                </details>
            </div>
        </div>

        <script src="./data/comun.js"></script>
        <script src="./data/celador.js"></script>
        <script src="./app.js"></script>
    </body>
</html>
