<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="title">OPE Osakidetza</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <link rel="stylesheet" href="./styles.css" />
        <script>
            (function () {
                try {
                    var t = localStorage.getItem('celador_theme');
                    if (t !== 'light' && t !== 'dark') {
                        t =
                            window.matchMedia &&
                            window.matchMedia('(prefers-color-scheme: dark)')
                                .matches
                                ? 'dark'
                                : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', t);
                } catch (e) {
                    /* ignore */
                }
            })();
        </script>
    </head>
    <body>
        <div class="wrap">
            <header>
                <button
                    type="button"
                    id="header-home"
                    class="header-home"
                    data-i18n-attr="aria-label:header.home,title:header.home"
                    aria-label="Volver al inicio"
                    title="Volver al inicio"
                >
                    <h1 data-i18n="header.title">OPE Osakidetza</h1>
                    <p
                        class="subtitle"
                        id="subtitle"
                        data-i18n="header.subtitle"
                    >
                        Test de práctica
                    </p>
                </button>
                <div class="stats" id="stats" hidden>
                    <div class="stat">
                        <span data-i18n="stats.question">Pregunta</span
                        ><b
                            ><span id="current">1</span>/<span id="total"
                                >0</span
                            ></b
                        >
                    </div>
                    <div class="stat">
                        <span data-i18n="stats.correct">Aciertos</span
                        ><b id="correct">0</b>
                    </div>
                    <div class="stat">
                        <span data-i18n="stats.wrong">Fallos</span
                        ><b id="wrong">0</b>
                    </div>
                    <div class="stat">
                        <span data-i18n="stats.percent">% acierto</span
                        ><b id="pct">—</b>
                    </div>
                </div>
            </header>

            <div class="controls setup-controls">
                <div
                    class="lang-toggle"
                    id="lang-toggle"
                    role="group"
                    data-i18n-attr="aria-label:lang.label"
                    aria-label="Idioma"
                ></div>
                <span class="spacer"></span>
                <button
                    id="theme-toggle"
                    type="button"
                    data-i18n-attr="aria-label:theme.toggle,title:theme.toggle"
                    aria-label="Cambiar tema"
                    title="Cambiar tema"
                >
                    🌙
                </button>
            </div>

            <div id="setup-area">
                <div id="resume-banner" class="card resume-banner" hidden></div>
                <div class="card">
                    <h2 class="setup-title" data-i18n="setup.title">
                        Elige los conjuntos de preguntas
                    </h2>
                    <p class="setup-help" data-i18n="setup.help">
                        Puedes seleccionar uno o varios. Al marcar varios, las
                        preguntas se combinan en un solo test.
                    </p>
                    <div id="set-list" class="set-list"></div>
                    <div class="nav">
                        <span
                            id="setup-total"
                            class="setup-total"
                            data-i18n="setup.zeroSelected"
                            >0 preguntas seleccionadas</span
                        >
                        <button
                            id="start-btn"
                            class="primary"
                            disabled
                            data-i18n="setup.start"
                        >
                            Empezar →
                        </button>
                    </div>
                </div>
            </div>

            <div id="quiz-container" hidden>
                <div class="controls">
                    <div class="mode-toggle">
                        <button
                            id="mode-seq"
                            class="active"
                            data-i18n="quiz.modeSeq"
                        >
                            Orden
                        </button>
                        <button id="mode-rand" data-i18n="quiz.modeRand">
                            Aleatorio
                        </button>
                    </div>
                    <button id="change-sets" data-i18n="quiz.changeSets">
                        ← Cambiar conjuntos
                    </button>
                    <button id="restart" data-i18n="quiz.restart">
                        ↻ Reiniciar
                    </button>
                    <button id="review" disabled data-i18n="quiz.review">
                        Ver fallos
                    </button>
                </div>

                <div class="progress">
                    <div
                        class="progress-bar"
                        id="bar"
                        style="width: 0.5%"
                    ></div>
                </div>

                <div id="quiz-area"></div>

                <details class="jumper">
                    <summary data-i18n="quiz.jumpTo">Ir a pregunta…</summary>
                    <div class="grid" id="grid"></div>
                </details>
            </div>
        </div>

        <script>
            // Question reporting. Runs against same-origin Pages Functions
            // under /comments and /admin. Set `turnstileSiteKey` from the
            // Cloudflare Turnstile dashboard; leave empty to keep the feature
            // inert. See BACKEND.md for setup.
            window.QUIZZY_CONFIG = {
                turnstileSiteKey: '0x4AAAAAAC-GTfF0O_9lP6_j'
            };
        </script>
        <script src="./i18n.js"></script>
        <script src="./data/comun.js"></script>
        <script src="./data/celador.js"></script>
        <script src="./data/auxiliar_admin.js"></script>
        <script src="./data/operario_servicios.js"></script>
        <script src="./report.js"></script>
        <script src="./app.js"></script>
    </body>
</html>
